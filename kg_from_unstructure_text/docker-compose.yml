version: '3.8'

services:
  # FastAPI应用服务
  api:
    build: .
    container_name: ecommerce-kg-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - NEBULA_HOST=nebula-graphd
      - NEBULA_PORT=9669
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - nebula-graphd
    networks:
      - kg-network

  # Nebula Graph服务
  nebula-metad:
    image: vesoft/nebula-metad:v3.5.0
    container_name: nebula-metad
    environment:
      - USER=root
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-metad
      - --ws_ip=nebula-metad
      - --port=9559
      - --ws_http_port=19559
      - --data_path=/data/meta
      - --log_dir=/logs
    volumes:
      - nebula-meta-data:/data/meta
      - nebula-meta-logs:/logs
    networks:
      - kg-network

  nebula-storaged:
    image: vesoft/nebula-storaged:v3.5.0
    container_name: nebula-storaged
    environment:
      - USER=root
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-storaged
      - --ws_ip=nebula-storaged
      - --port=9779
      - --ws_http_port=19779
      - --data_path=/data/storage
      - --log_dir=/logs
    volumes:
      - nebula-storage-data:/data/storage
      - nebula-storage-logs:/logs
    depends_on:
      - nebula-metad
    networks:
      - kg-network

  nebula-graphd:
    image: vesoft/nebula-graphd:v3.5.0
    container_name: nebula-graphd
    environment:
      - USER=root
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-graphd
      - --ws_ip=nebula-graphd
      - --port=9669
      - --ws_http_port=19669
      - --log_dir=/logs
    ports:
      - "9669:9669"
    volumes:
      - nebula-graph-logs:/logs
    depends_on:
      - nebula-metad
      - nebula-storaged
    networks:
      - kg-network

  # ChromaDB服务（可选，如果需要独立部署）
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ALLOW_RESET=true
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - kg-network

volumes:
  nebula-meta-data:
  nebula-meta-logs:
  nebula-storage-data:
  nebula-storage-logs:
  nebula-graph-logs:
  chroma-data:

networks:
  kg-network:
    driver: bridge
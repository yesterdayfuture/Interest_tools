# 大语言模型评估系统配置文件

# 应用配置
app:
  name: "LLM Evaluator"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

# 模型配置
models:
  # OpenAI API配置
  # 配置优先级（从高到低）：
  # 1. 显式传入的参数（代码中直接传入）
  # 2. 环境变量（OPENAI_API_KEY, OPENAI_BASE_URL）
  # 3. 本配置文件（如下所示）
  # 4. 默认值
  openai:
    # API密钥配置
    # 方式1: 直接在此填写（不推荐，可能泄露密钥）
    # 方式2: 设置环境变量 OPENAI_API_KEY=your-key
    # 方式3: 代码中显式传入 OpenAIModel(api_key='your-key')
    api_key: "xxxx"  # 留空则从环境变量读取
    
    # API基础URL配置
    # 方式1: 直接修改下方配置
    # 方式2: 设置环境变量 OPENAI_BASE_URL=https://...
    # 方式3: 代码中显式传入 OpenAIModel(base_url='https://...')
    base_url: "https://api.deepseek.com"
    
    # 其他OpenAI配置
    default_model: "deepseek-reasoner"  # 默认模型名称
    timeout: 30                     # API请求超时（秒）
    max_retries: 3                  # 最大重试次数
  
  # 本地模型配置（HuggingFace Transformers）
  local:
    model_path: ""  # 本地模型路径
    device: "auto"  # auto/cpu/cuda
    max_length: 2048
    temperature: 0.7

# 评估配置
evaluation:
  # 默认评估参数
  default:
    batch_size: 8
    num_workers: 4
    max_samples: -1  # -1表示评估全部样本
    seed: 42
  
  # 准确率评估阈值
  accuracy_threshold: 0.7
  
  # 性能测试参数
  performance:
    num_runs: 5  # 性能测试运行次数
    warmup_runs: 2  # 预热运行次数

# 数据集配置
datasets:
  # 数据集存储路径
  data_dir: "./data"
  
  # 支持的数据集列表
  supported:
    - mmlu
    - ceval
    - cmmlu
    - truthfulqa
  
  # MMLU数据集配置
  mmlu:
    name: "MMLU"
    description: "Massive Multi-task Language Understanding"
    categories:
      - humanities
      - social_sciences
      - stem
      - other
  
  # C-Eval数据集配置
  ceval:
    name: "C-Eval"
    description: "Chinese Evaluation Dataset"
    difficulty_levels:
      - middle_school
      - high_school
      - college
      - professional

# 日志配置
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"
  file: "logs/llm_evaluator.log"
  rotation: "10 MB"

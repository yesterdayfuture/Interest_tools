<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>视频任务管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .progress-bar { @apply h-2 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden }
      .progress-value { @apply h-full bg-blue-500 transition-all duration-300 }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors min-h-screen">
<div id="app" class="max-w-7xl mx-auto p-4 md:p-6">
  <!-- 头部 -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl md:text-3xl font-bold">视频切分 & 关键帧提取</h1>
    <button @click="toggleDark" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700">
      🌙 暗黑模式
    </button>
  </div>

  <!-- 上传区域 -->
  <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow mb-6">
    <div class="flex flex-col md:flex-row gap-3 items-center">
      <input type="file" ref="fileInput" accept="video/*"
        class="block w-full md:flex-1 border dark:border-gray-700 rounded-lg p-2 bg-transparent">
      <button @click="submitTask" :disabled="loading"
        class="w-full md:w-auto bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-400">
        {{ loading ? '提交中...' : '上传并处理' }}
      </button>
    </div>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">{{ tip }}</p>
  </div>

  <!-- 任务列表 -->
  <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-4">任务列表（自动刷新）</h2>
    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-100 dark:bg-gray-700">
            <th class="border p-2 text-left">任务ID</th>
            <th class="border p-2 text-left">状态</th>
            <th class="border p-2 text-left">进度</th>
            <th class="border p-2 text-left">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="task in tasks" :key="task.task_id" class="hover:bg-gray-50 dark:hover:bg-gray-700">
            <td class="border p-2 text-sm">{{ task.task_id }}</td>
            <td class="border p-2">
              <span :class="statusClass(task.status)" class="px-2 py-1 rounded text-xs">
                {{ task.status }}
              </span>
            </td>
            <td class="border p-2 w-64">
              <div class="progress-bar">
                <div class="progress-value" :style="{width: task.progress + '%'}"></div>
              </div>
              <div class="text-xs mt-1 text-right">{{ task.progress }}%</div>
            </td>
            <td class="border p-2 flex gap-2 flex-wrap">
              <button @click="cancelTask(task.task_id)" v-if="canCancel(task)"
                class="px-3 py-1 text-sm bg-red-500 text-white rounded hover:bg-red-600">
                取消
              </button>
              <button @click="showPreview(task.task_id)" v-if="task.status === 'completed'"
                class="px-3 py-1 text-sm bg-green-500 text-white rounded hover:bg-green-600">
                预览
              </button>
              <a :href="`/tasks/${task.task_id}/source.mp4`" target="_blank" v-if="task.data"
                class="px-3 py-1 text-sm bg-blue-500 text-white rounded hover:bg-blue-600 no-underline">
                下载原视频
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 预览模态框 -->
  <div v-if="previewVisible" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" @click.self="previewVisible=false">
    <div class="bg-white dark:bg-gray-800 rounded-xl max-w-5xl w-full max-h-[90vh] overflow-auto p-5">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold">关键帧预览</h3>
        <button @click="previewVisible=false" class="text-2xl">×</button>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
        <img v-for="img in currentFrames" :src="img" @click="openImg(img)"
          class="w-full h-32 object-cover rounded cursor-pointer hover:scale-105 transition-transform">
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue
const api = axios.create({ baseURL: 'http://127.0.0.1:8000' })

createApp({
  setup() {
    const tasks = ref([])
    const loading = ref(false)
    const tip = ref("选择视频文件，支持 mp4/avi/mov，最大并行 20 任务")
    const fileInput = ref(null)
    const previewVisible = ref(false)
    const currentFrames = ref([])
    const currentTaskId = ref('')

    // 暗黑模式
    const toggleDark = () => {
      document.documentElement.classList.toggle('dark')
      localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'
    }

    // 状态样式
    const statusClass = (s) => {
      const map = {
        pending: 'bg-gray-200 dark:bg-gray-600',
        running: 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300',
        completed: 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300',
        failed: 'bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300',
        timeout: 'bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300',
        cancelled: 'bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300'
      }
      return map[s] || 'bg-gray-200'
    }

    const canCancel = (info) => ['pending', 'running'].includes(info.status)

    // 获取任务
    const fetchTasks = async () => {
      try {
        const res = await api.get('/tasks')
        tasks.value = res.data.tasks || []
      } catch (e) {}
    }

    // 提交任务
    const submitTask = async () => {
      const file = fileInput.value?.files?.[0]
      if (!file) return alert('请选择视频')
      loading.value = true
      tip.value = "上传中..."
      const fd = new FormData()
      fd.append('file', file)
      try {
        await api.post('/add_task', fd)
        tip.value = "任务提交成功"
        fileInput.value.value = ''
      } catch (e) {
        tip.value = "提交失败"
      }
      loading.value = false
      fetchTasks()
    }

    // 取消任务
    const cancelTask = async (tid) => {
      if (!confirm('确定取消？')) return
      await api.post(`/cancel/${tid}`)
      fetchTasks()
    }

    // 预览关键帧
    const showPreview = (tid) => {
      const task = tasks.value.find(t => t.task_id === tid)
      if (task && task.data && task.data.frame_list) {
        // 后端返回的是 /tasks/{task_id}/frames/{filename},可以直接使用
        currentFrames.value = task.data.frame_list
        currentTaskId.value = tid
        previewVisible.value = true
      }
    }

    // 打开大图
    const openImg = (url) => window.open(url, '_blank')

    onMounted(() => {
      fetchTasks()
      setInterval(fetchTasks, 3000)
    })

    return {
      tasks, loading, tip, fileInput, previewVisible, currentFrames, currentTaskId,
      statusClass, canCancel, toggleDark, submitTask, cancelTask, showPreview, openImg
    }
  }
}).mount('#app')
</script>
</body>
</html>
